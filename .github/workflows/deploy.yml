name: Deploy to AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ca-central-1
  BUCKET_NAME: steam-price-tracker-frontend-010624488687-ca-central-1-an
  DISTRIBUTION_ID: E37BWGU4GWZ3H8
  ECR_REPO: 010624488687.dkr.ecr.ca-central-1.amazonaws.com/steam-price-monitor-ecs
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          VITE_API_URL="" npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.BUCKET_NAME }}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ env.DISTRIBUTION_ID }} --paths "/*"

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR_REPO }}

      - name: Build and push Docker image
        run: |
          docker build -t steam-api backend/
          docker tag steam-api:latest ${{ env.ECR_REPO }}:latest
          docker push ${{ env.ECR_REPO }}:latest

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ env.EC2_INSTANCE_ID }}" \
            --parameters '{"commands":["docker pull ${{ env.ECR_REPO }}:latest && docker stop steam-api || true && docker rm steam-api || true && docker run -d --name steam-api --restart=always -p 3000:3000 -e DATABASE_URL=\"${{ secrets.DATABASE_URL }}\" -e WORKER_SECRET=\"${{ secrets.WORKER_SECRET }}\" -e PORT=3000 ${{ env.ECR_REPO }}:latest"]}' \
            --region ${{ env.AWS_REGION }} \
            --query "Command.CommandId" --output text)

          echo "Waiting for SSM command to finish..."
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id ${{ env.EC2_INSTANCE_ID }} --region ${{ env.AWS_REGION }}
